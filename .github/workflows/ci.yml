name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system ruff

      - name: Lint with Ruff
        run: uv run --python 3.12 ruff check tools/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system zensical

      - name: Test nav parser
        run: uv run --python 3.12 python tools/test_nav_parser.py
        if: always()

      - name: Test content cache
        run: uv run --python 3.12 python tools/test_content_cache.py
        if: always()

      - name: Test converter
        run: uv run --python 3.12 python tools/test_converter.py
        if: always()

      - name: Test discourse client
        run: uv run --python 3.12 python tools/test_discourse_client.py
        if: always()

      - name: Test sync orchestrator
        run: uv run --python 3.12 python tools/test_sync_to_discourse.py
        if: always()

  preview:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history to compute diff vs base branch
          fetch-depth: 0

      - name: Restore Discourse sync cache
        uses: actions/cache/restore@v4
        with:
          path: .discourse_sync_cache/
          key: discourse-sync-cache-dummy
          restore-keys: |
            discourse-sync-cache-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system zensical

      - name: Compute docs affected by this PR
        id: diff
        env:
          BASE_REF: ${{ github.base_ref }}
          DOCS_SYNC_REF_NAME: ${{ github.base_ref }}
          DISCOURSE_URL: ${{ secrets.DISCOURSE_URL }}
        run: |
          set -euo pipefail
          git fetch --depth=1 origin "$BASE_REF"
          BASE_SHA=$(git rev-parse "origin/$BASE_REF")
          echo "Base: $BASE_REF ($BASE_SHA)"

          # Render every nav doc at HEAD (PR) and at the base commit,
          # then diff the content hashes.  This surfaces exactly the
          # docs whose sync-rendered body would differ between master
          # and this PR merged — including changes introduced by
          # edits to zensical.toml, tools/converter.py, or anything
          # else that influences rendering.
          uv run --python 3.12 python tools/render_docs.py > /tmp/head_hashes.json

          WORKTREE=$(mktemp -d)
          git worktree add --detach "$WORKTREE" "$BASE_SHA"
          # render_docs.py may not exist on the base branch yet; copy
          # the current HEAD version in so we can render base content
          # with whichever render entry point exists today.  The imports
          # it pulls (converter, nav_parser, sync_to_discourse) still
          # resolve to the worktree copies, so tools changes on HEAD
          # vs base are captured in the hash diff.
          cp tools/render_docs.py "$WORKTREE/tools/render_docs.py"
          (
            cd "$WORKTREE"
            uv run --python 3.12 python tools/render_docs.py > /tmp/base_hashes.json
          )
          git worktree remove --force "$WORKTREE"

          python3 - <<'PY' > /tmp/affected.txt
          import json
          head = json.load(open('/tmp/head_hashes.json'))
          base = json.load(open('/tmp/base_hashes.json'))
          for path in sorted(set(head) | set(base)):
              if head.get(path) != base.get(path):
                  print(path)
          PY

          AFFECTED=$(cat /tmp/affected.txt || true)
          echo "AFFECTED_DOCS:"
          printf '%s\n' "$AFFECTED"

          ANY_CHANGE=""
          [ -n "$AFFECTED" ] && ANY_CHANGE="1"

          ONLY_ARGS=$(printf '%s ' $AFFECTED)
          ONLY_ARGS=${ONLY_ARGS% }

          DOC_COUNT=0
          if [ -n "$AFFECTED" ]; then
            DOC_COUNT=$(printf '%s\n' "$AFFECTED" | wc -l | tr -d ' ')
          fi

          {
            echo "any_change=$ANY_CHANGE"
            echo "only_args=$ONLY_ARGS"
            echo "doc_count=$DOC_COUNT"
          } >> "$GITHUB_OUTPUT"

      - name: Dry-run Discourse sync
        if: steps.diff.outputs.any_change == '1'
        env:
          DISCOURSE_URL: ${{ secrets.DISCOURSE_URL }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          DISCOURSE_API_USER: ${{ secrets.DISCOURSE_API_USER }}
          DISCOURSE_CATEGORY_MAP: ${{ vars.DISCOURSE_CATEGORY_MAP }}
          ONLY_ARGS: ${{ steps.diff.outputs.only_args }}
          # Force footer GitHub link to base branch so dry-run body
          # matches what sync_to_discourse.py wrote from the last master
          # push.  Otherwise build_footer embeds the PR ref (e.g.
          # "14/merge"), making every remote match check fail and
          # inflating the preview count.  GitHub Actions reserves
          # GITHUB_REF_NAME and ignores step-level env overrides, so
          # we use a dedicated env var that _resolve_ref_name consults
          # first.
          DOCS_SYNC_REF_NAME: ${{ github.base_ref }}
        run: |
          uv run --python 3.12 python tools/sync_to_discourse.py \
            --dry-run --verbose --only $ONLY_ARGS 2>&1 | tee sync_preview.txt

      - name: Write no-change preview
        if: steps.diff.outputs.any_change != '1'
        run: |
          cat > sync_preview.txt <<'EOF'
          No documentation or sync tooling changes detected in this PR.
          Skipping Discourse dry-run.
          EOF

      - name: Build PR comment
        id: comment
        env:
          ANY_CHANGE: ${{ steps.diff.outputs.any_change }}
          DOC_COUNT: ${{ steps.diff.outputs.doc_count }}
        run: |
          CREATED=$(grep -oP 'Created:\s+\K\d+' sync_preview.txt || echo "0")
          UPDATED=$(grep -oP 'Updated \(Normal\):\s+\K\d+' sync_preview.txt || echo "0")
          SIDEBARS=$(grep -oP 'Sidebars Updated:\s+\K\d+' sync_preview.txt || echo "0")
          FAILED=$(grep -oP 'Failed:\s+\K\d+' sync_preview.txt || echo "0")
          TOTAL=$(grep -oP 'Total Parsed:\s+\K\d+' sync_preview.txt || echo "0")

          # Sidebar updates include every About topic (index.md) that
          # actually differs from Discourse, so they count toward the
          # "modified" total.
          CHANGES=$((CREATED + UPDATED + SIDEBARS))

          {
            echo 'body<<COMMENT_EOF'
            echo "### Discourse Sync Preview"
            echo ""
            if [ "$ANY_CHANGE" != "1" ]; then
              echo "No documentation or sync tooling changes detected. No forum topic changes needed."
            elif [ "$CHANGES" -eq 0 ]; then
              echo "Docs are up to date. No forum topic changes needed."
            else
              SUFFIX="of ${TOTAL} total"
              if [ -n "${{ steps.diff.outputs.only_args }}" ] && [ -z "${{ steps.diff.outputs.structural }}" ]; then
                SUFFIX="(filtered to ${DOC_COUNT} PR-changed doc(s))"
              fi
              echo "**${CHANGES} topic(s) would be modified** (${CREATED} created, ${UPDATED} updated, ${SIDEBARS} index/sidebar) ${SUFFIX}."
            fi
            if [ "$FAILED" -ne 0 ]; then
              echo ""
              echo "> [!WARNING]"
              echo "> ${FAILED} topic(s) failed to resolve."
            fi
            echo ""
            echo "<details>"
            echo "<summary>Full dry-run output</summary>"
            echo ""
            echo '```'
            cat sync_preview.txt
            echo '```'
            echo ""
            echo "</details>"
            echo 'COMMENT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: ${{ steps.comment.outputs.body }}
          comment_tag: discourse-sync-preview
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
