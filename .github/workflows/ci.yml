name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system ruff

      - name: Lint with Ruff
        run: uv run --python 3.12 ruff check tools/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system zensical

      - name: Test nav parser
        run: uv run --python 3.12 python tools/test_nav_parser.py
        if: always()

      - name: Test content cache
        run: uv run --python 3.12 python tools/test_content_cache.py
        if: always()

      - name: Test converter
        run: uv run --python 3.12 python tools/test_converter.py
        if: always()

      - name: Test discourse client
        run: uv run --python 3.12 python tools/test_discourse_client.py
        if: always()

      - name: Test sync orchestrator
        run: uv run --python 3.12 python tools/test_sync_to_discourse.py
        if: always()

  preview:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history to compute diff vs base branch
          fetch-depth: 0

      - name: Restore Discourse sync cache
        uses: actions/cache/restore@v4
        with:
          path: .discourse_sync_cache/
          key: discourse-sync-cache-dummy
          restore-keys: |
            discourse-sync-cache-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system zensical

      - name: Determine changed paths
        id: diff
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --depth=1 origin "$BASE_REF"
          BASE_SHA=$(git rev-parse "origin/$BASE_REF")
          echo "Base: $BASE_REF ($BASE_SHA)"

          # Docs changed (added or modified only — deletions not handled by sync)
          CHANGED_DOCS=$(git diff --name-only --diff-filter=AM \
            "$BASE_SHA"...HEAD -- 'docs/**/*.md' \
            | sed 's|^docs/||' | sort -u) || CHANGED_DOCS=""

          # Structural changes that require a full sync: nav definition,
          # sync tooling itself, or any index.md (affects sidebars).
          STRUCTURAL=$(git diff --name-only \
            "$BASE_SHA"...HEAD -- zensical.toml 'tools/**' 'docs/**/index.md' \
            | sort -u) || STRUCTURAL=""

          echo "CHANGED_DOCS:"
          printf '%s\n' "$CHANGED_DOCS"
          echo "STRUCTURAL:"
          printf '%s\n' "$STRUCTURAL"

          ANY_CHANGE=""
          if [ -n "$CHANGED_DOCS" ] || [ -n "$STRUCTURAL" ]; then
            ANY_CHANGE="1"
          fi

          # Space-separated doc paths for CLI --only
          ONLY_ARGS=$(printf '%s ' $CHANGED_DOCS)
          ONLY_ARGS=${ONLY_ARGS% }

          # Structural collapsed to single-line marker (presence only)
          STRUCTURAL_LINE=$(printf '%s ' $STRUCTURAL)
          STRUCTURAL_LINE=${STRUCTURAL_LINE% }

          DOC_COUNT=0
          if [ -n "$CHANGED_DOCS" ]; then
            DOC_COUNT=$(printf '%s\n' "$CHANGED_DOCS" | wc -l | tr -d ' ')
          fi

          {
            echo "any_change=$ANY_CHANGE"
            echo "structural=$STRUCTURAL_LINE"
            echo "only_args=$ONLY_ARGS"
            echo "doc_count=$DOC_COUNT"
          } >> "$GITHUB_OUTPUT"

      - name: Dry-run Discourse sync
        if: steps.diff.outputs.any_change == '1'
        env:
          DISCOURSE_URL: ${{ secrets.DISCOURSE_URL }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          DISCOURSE_API_USER: ${{ secrets.DISCOURSE_API_USER }}
          DISCOURSE_CATEGORY_MAP: ${{ vars.DISCOURSE_CATEGORY_MAP }}
          STRUCTURAL: ${{ steps.diff.outputs.structural }}
          ONLY_ARGS: ${{ steps.diff.outputs.only_args }}
          # Force footer GitHub link to base branch so dry-run body
          # matches what sync_to_discourse.py wrote from the last master
          # push.  Otherwise build_footer embeds the PR ref (e.g.
          # "14/merge"), making every remote match check fail and
          # inflating the preview count.
          GITHUB_REF_NAME: ${{ github.base_ref }}
          # Print first divergence on mismatch so CI logs reveal what
          # drifted between local render and stored Discourse raw.
          SYNC_DEBUG_DIFF: "1"
        run: |
          ARGS="--dry-run --verbose"
          # Structural changes → full sync preview (sidebar regen eligible).
          # Leaf-only doc changes → filter via --only for accurate preview.
          if [ -z "$STRUCTURAL" ] && [ -n "$ONLY_ARGS" ]; then
            ARGS="$ARGS --only $ONLY_ARGS"
          fi
          uv run --python 3.12 python tools/sync_to_discourse.py $ARGS 2>&1 | tee sync_preview.txt

      - name: Write no-change preview
        if: steps.diff.outputs.any_change != '1'
        run: |
          cat > sync_preview.txt <<'EOF'
          No documentation or sync tooling changes detected in this PR.
          Skipping Discourse dry-run.
          EOF

      - name: Build PR comment
        id: comment
        env:
          ANY_CHANGE: ${{ steps.diff.outputs.any_change }}
          DOC_COUNT: ${{ steps.diff.outputs.doc_count }}
        run: |
          CREATED=$(grep -oP 'Created:\s+\K\d+' sync_preview.txt || echo "0")
          UPDATED=$(grep -oP 'Updated \(Normal\):\s+\K\d+' sync_preview.txt || echo "0")
          UPDATED_IDX=$(grep -oP 'Updated \(Index\):\s+\K\d+' sync_preview.txt || echo "0")
          SIDEBARS=$(grep -oP 'Sidebars Updated:\s+\K\d+' sync_preview.txt || echo "0")
          FAILED=$(grep -oP 'Failed:\s+\K\d+' sync_preview.txt || echo "0")
          TOTAL=$(grep -oP 'Total Parsed:\s+\K\d+' sync_preview.txt || echo "0")

          CHANGES=$((CREATED + UPDATED + UPDATED_IDX))

          {
            echo 'body<<COMMENT_EOF'
            echo "### Discourse Sync Preview"
            echo ""
            if [ "$ANY_CHANGE" != "1" ]; then
              echo "No documentation or sync tooling changes detected. No forum topic changes needed."
            elif [ "$CHANGES" -eq 0 ] && [ "$SIDEBARS" -eq 0 ]; then
              echo "Docs are up to date. No forum topic changes needed."
            else
              SUFFIX="of ${TOTAL} total"
              if [ -n "${{ steps.diff.outputs.only_args }}" ] && [ -z "${{ steps.diff.outputs.structural }}" ]; then
                SUFFIX="(filtered to ${DOC_COUNT} PR-changed doc(s))"
              fi
              echo "**${CHANGES} topic(s) would be modified** (${CREATED} created, $((UPDATED + UPDATED_IDX)) updated) ${SUFFIX}."
              if [ "$SIDEBARS" -gt 0 ]; then
                echo ""
                echo "**${SIDEBARS} sidebar(s)** would be regenerated."
              fi
            fi
            if [ "$FAILED" -ne 0 ]; then
              echo ""
              echo "> [!WARNING]"
              echo "> ${FAILED} topic(s) failed to resolve."
            fi
            echo ""
            echo "<details>"
            echo "<summary>Full dry-run output</summary>"
            echo ""
            echo '```'
            cat sync_preview.txt
            echo '```'
            echo ""
            echo "</details>"
            echo 'COMMENT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: ${{ steps.comment.outputs.body }}
          comment_tag: discourse-sync-preview
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
