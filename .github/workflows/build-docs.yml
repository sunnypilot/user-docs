name: Build Docs

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'zensical.toml'
  pull_request:
    paths:
      - 'docs/**'
      - 'zensical.toml'

concurrency:
  group: build-docs-${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && github.run_id || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build sunnypilot docs
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install uv
        uv pip install --system zensical

    - name: Build docs
      run: zensical build
