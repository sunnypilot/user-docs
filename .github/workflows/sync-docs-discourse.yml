name: Sync Docs to Discourse

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-sync all docs (bypass cache)"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Dry run (no API mutations)"
        required: false
        default: false
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run converter tests
        run: uv run python tools/test_converter.py

      - name: Run discourse client tests
        run: uv run python tools/test_discourse_client.py

      - name: Run sync orchestrator tests
        run: uv run python tools/test_sync_to_discourse.py

  sync:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Sync docs to Discourse
        env:
          DISCOURSE_URL: ${{ secrets.DISCOURSE_URL }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          DISCOURSE_API_USER: ${{ secrets.DISCOURSE_API_USER }}
          DISCOURSE_CATEGORY_MAP: ${{ vars.DISCOURSE_CATEGORY_MAP }}
          FORCE_SYNC: ${{ inputs.force }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ARGS="--verbose"
          if [ "$FORCE_SYNC" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          uv run python tools/sync_to_discourse.py $ARGS
